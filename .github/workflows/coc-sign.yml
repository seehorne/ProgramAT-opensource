name: Sign Code of Conduct

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: read

jobs:
  sign:
    if: github.event.issue.pull_request && github.event.comment.body == '/sign-coc'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Add signer
        run: |
          USER="${{ github.event.comment.user.login }}"
          FILE=".github/code-of-conduct-signatures.yml"

          if yq '.signed[]' "$FILE" | grep -Fxq "$USER"; then
            echo "Already signed"
            exit 0
          fi

          yq -i '.signed += ["'"$USER"'"] | .signed |= unique | .signed |= sort' "$FILE"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$FILE"
          git commit -m "Record Code of Conduct signature for $USER"
          git push

      - name: Reply
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body \
          "Thanks @${{ github.event.comment.user.login }} — your Code of Conduct signature has been recorded. Please re-run the failed check if it does not update automatically."
