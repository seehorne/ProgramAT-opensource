name: Auto Grant Write Access

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  grant-access:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # Parse GitHub event payload
      # -----------------------------
      - name: Parse event
        id: event
        run: |
          echo "comment=$(jq -r .comment.body "$GITHUB_EVENT_PATH")" >> $GITHUB_OUTPUT
          echo "user=$(jq -r .comment.user.login "$GITHUB_EVENT_PATH")" >> $GITHUB_OUTPUT
          echo "issue=$(jq -r .issue.number "$GITHUB_EVENT_PATH")" >> $GITHUB_OUTPUT
          echo "type=$(jq -r .comment.user.type "$GITHUB_EVENT_PATH")" >> $GITHUB_OUTPUT

      # -----------------------------
      # Filter bots/apps
      # -----------------------------
      - name: Ignore bots
        if: steps.event.outputs.type != 'User'
        run: |
          echo "Ignoring non-user account"
          exit 0

      # -----------------------------
      # Validate issue + command
      # -----------------------------
      - name: Validate request
        id: validate
        run: |
          ISSUE="40"
          COMMENT="${{ steps.event.outputs.comment }}"

          if [ "${{ steps.event.outputs.issue }}" != "$ISSUE" ]; then
            echo "match=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if echo "$COMMENT" | grep -qi "/request-contributor-status"; then
            echo "match=true" >> $GITHUB_OUTPUT
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit if invalid request
        if: steps.validate.outputs.match != 'true'
        run: |
          echo "Not a valid request"
          exit 0

      # -----------------------------
      # Load denylist from coc-signatures branch
      # (YAML via yq, same pattern as CoC workflow)
      # -----------------------------
      - name: Checkout signatures branch
        uses: actions/checkout@v4
        with:
          ref: coc-signatures
          path: signatures

      - name: Load denylist
        id: denylist
        run: |
          FILE="signatures/.github/denylist.yml"

          if [ ! -f "$FILE" ]; then
            echo "banned=" >> $GITHUB_OUTPUT
            exit 0
          fi

          banned=$(yq '.banned_users[]?' "$FILE" | tr '\n' ' ')

          echo "banned=$banned" >> $GITHUB_OUTPUT

      # -----------------------------
      # Check denylist
      # -----------------------------
      - name: Check denylist
        id: check
        run: |
          USER="${{ steps.event.outputs.user }}"
          BANNED="${{ steps.denylist.outputs.banned }}"

          if echo "$BANNED" | grep -wiq "$USER"; then
            echo "allowed=false" >> $GITHUB_OUTPUT
          else
            echo "allowed=true" >> $GITHUB_OUTPUT
          fi

      # -----------------------------
      # Reject banned users
      # -----------------------------
      - name: Reject denylisted users
        if: steps.check.outputs.allowed != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "@${{ steps.event.outputs.user }} cannot be granted access."

          exit 1

      # -----------------------------
      # Check existing membership
      # -----------------------------
      - name: Check team membership
        id: membership
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          USER="${{ steps.event.outputs.user }}"
          ORG="${{ github.repository_owner }}"
          TEAM="contributors"

          if gh api \
            /orgs/$ORG/teams/$TEAM/memberships/$USER \
            >/dev/null 2>&1; then

            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if already member
        if: steps.membership.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "@${{ steps.event.outputs.user }} already has contributor access."

          exit 0

      # -----------------------------
      # Grant access via team
      # -----------------------------
      - name: Grant write access
        if: steps.membership.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          USER="${{ steps.event.outputs.user }}"
          ORG="${{ github.repository_owner }}"
          TEAM="contributors"

          gh api \
            -X PUT \
            /orgs/$ORG/teams/$TEAM/memberships/$USER \
            -f role=member

      # -----------------------------
      # Success comment
      # -----------------------------
      - name: Confirm access granted
        if: steps.membership.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "@${{ steps.event.outputs.user }} has been granted contributor access via the contributors team."
